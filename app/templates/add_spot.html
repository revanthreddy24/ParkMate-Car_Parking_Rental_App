{% extends "base.html" %}

{% block content %}
<div class="form-container wide">
    <h1>Add Parking Spot</h1>

    <form method="post" action="/spots/add">
        <label>Spot Title</label>
        <input type="text" name="title" placeholder="Example: Driveway near downtown" required>

        <label>Address</label>
        <input type="text" name="address" placeholder="Example: 123 Main Street" required>

        <label>City</label>
        <input type="text" name="city" placeholder="Example: Boston" required>

        <label>Price Per Hour</label>
        <input type="number" name="price_per_hour" step="0.01" min="1" required>

        <label>Description</label>
        <textarea name="description" rows="5" placeholder="Mention gate access, safety, nearby landmarks, etc."></textarea>

        <button type="submit" class="btn full">Add Spot</button>
    </form>
</div>
{% endblock %}
